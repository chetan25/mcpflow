name: Publish to PyPI

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: python
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,webmcp]"

      - name: Run tests
        working-directory: python
        run: |
          pytest tests/ -v --ignore=tests/test_init.py

  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Tag: ${{ github.ref }} -> Version: $VERSION"

      - name: Verify version matches
        working-directory: python
        run: |
          PYPROJECT_VERSION=$(grep "^version = " pyproject.toml | cut -d'"' -f2)
          TAG_VERSION=${{ steps.version.outputs.VERSION }}
          if [ "$PYPROJECT_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: pyproject.toml has $PYPROJECT_VERSION but tag has $TAG_VERSION"
            exit 1
          fi
          echo "✓ Version matches: $TAG_VERSION"

      - name: Build package
        working-directory: python
        run: |
          python -m pip install --upgrade pip build
          python -m build
          ls -lh dist/

      - name: Verify metadata
        working-directory: python
        run: |
          pip install twine
          twine check dist/*

      - name: Publish to PyPI
        working-directory: python
        run: |
          python -m pip install twine
          twine upload dist/* -u __token__ -p ${{ secrets.PYPI_API_TOKEN }}
        env:
          TWINE_NON_INTERACTIVE: 1

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ steps.version.outputs.VERSION }}
          body: |
            Published to PyPI: https://pypi.org/project/mcpflow/${{ steps.version.outputs.VERSION }}/
            
            View on PyPI: https://pypi.org/project/mcpflow/
          draft: false
          prerelease: false
