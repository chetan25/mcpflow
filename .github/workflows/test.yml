name: Tests & Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: python
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,webmcp]"

      - name: Lint with ruff
        working-directory: python
        run: |
          pip install ruff
          ruff check . --exclude migrations
        continue-on-error: true

      - name: Format check with black
        working-directory: python
        run: |
          pip install black
          black --check --diff .
        continue-on-error: true

      - name: Type check with mypy
        working-directory: python
        run: |
          pip install mypy types-PyYAML types-click
          mypy mcpflow --ignore-missing-imports
        continue-on-error: true

      - name: Run tests
        working-directory: python
        run: |
          pytest tests/ -v --cov=mcpflow --cov-report=term-missing --ignore=tests/test_init.py

      - name: Build package
        working-directory: python
        run: |
          pip install build
          python -m build
          ls -lh dist/

      - name: Verify package
        working-directory: python
        run: |
          pip install twine
          twine check dist/*
